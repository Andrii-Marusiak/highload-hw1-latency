apiVersion: 1

groups:
  - orgId: 1
    name: service-alerts
    folder: Service Alerts
    interval: 1m
    rules:
      - uid: high-error-rate
        title: "High Error Rate (>5%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
              query: |
                total = from(bucket: "metrics")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r._measurement == "http_requests_total")
                  |> filter(fn: (r) => r._field == "counter")
                  |> derivative(unit: 5m, nonNegative: true)
                  |> group()
                  |> aggregateWindow(every: 5m, fn: sum, createEmpty: false)
                  |> set(key: "_field", value: "total")

                errors = from(bucket: "metrics")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r._measurement == "http_requests_total")
                  |> filter(fn: (r) => r._field == "counter")
                  |> filter(fn: (r) => r.status_class == "5xx")
                  |> derivative(unit: 5m, nonNegative: true)
                  |> group()
                  |> aggregateWindow(every: 5m, fn: sum, createEmpty: false)
                  |> set(key: "_field", value: "errors")

                union(tables: [total, errors])
                  |> pivot(rowKey: ["_time"], columnKey: ["_field"], valueColumn: "_value")
                  |> map(fn: (r) => ({_time: r._time, _value: if exists r.total and r.total > 0.0 then (if exists r.errors then r.errors else 0.0) / r.total * 100.0 else 0.0}))
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Error rate exceeds 5% of total traffic over the last 5 minutes"

      - uid: high-p95-latency
        title: "High P95 Latency (>500ms)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
              query: |
                from(bucket: "metrics")
                  |> range(start: -5m)
                  |> filter(fn: (r) => r._measurement == "http_request_duration_ms")
                  |> filter(fn: (r) => r._field != "count" and r._field != "sum")
                  |> aggregateWindow(every: 5m, fn: last, createEmpty: false)
                  |> group(columns: ["_time", "_field"])
                  |> sum()
                  |> group(columns: ["_time"])
                  |> map(fn: (r) => ({_time: r._time, _value: r._value, le: float(v: r._field)}))
                  |> sort(columns: ["le"])
                  |> histogramQuantile(quantile: 0.95, upperBoundColumn: "le")
                  |> group()
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params:
                      - 500
                    type: gt
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency exceeds 500 ms over the last 5 minutes"

      - uid: high-cpu-utilisation
        title: "High CPU Utilisation (>80%)"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: influxdb
            model:
              refId: A
              intervalMs: 1000
              maxDataPoints: 43200
              query: |
                from(bucket: "metrics")
                  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                  |> filter(fn: (r) => r._measurement == "cpu")
                  |> filter(fn: (r) => r._field == "usage_idle")
                  |> filter(fn: (r) => r.cpu == "cpu-total")
                  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
                  |> map(fn: (r) => ({r with _value: 100.0 - r._value}))
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    params:
                      - 80
                    type: gt
                  operator:
                    type: and
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU utilisation exceeds 80% over the last 5 minutes"

contactPoints:
  - orgId: 1
    name: default-notifications
    receivers:
      - uid: default-notifications
        type: email
        disableResolveMessage: false
        settings:
          addresses: admin@lab.local
          singleEmail: true

policies:
  - orgId: 1
    receiver: default-notifications
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
