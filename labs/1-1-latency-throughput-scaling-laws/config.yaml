# Benchmark configuration
# Students: adjust these values or modify the simulator code as your improvement.

service_time_ms: 10       # Base simulated processing time per request (ms)
workers: 4                # Fallback when worker sweep finds no valid probe
total_requests: 500       # Requests per workload condition (serial / parallel)
saturated_multiplier: 3   # Saturated workload sends total_requests * multiplier
max_workers: 64           # Upper bound for worker sweep (2, 4, 8, ... up to this)
probe_requests: 100       # Requests per probe run during worker sweep
